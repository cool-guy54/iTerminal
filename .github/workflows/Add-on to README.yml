name: addons to README Links

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  update-readme:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-python-version: '3.x'

      - name: Generate Links List
        run: |
          python -c "
          import os

          TARGET_FOLDER = 'Add-ons' 
          
          links_list = []

          if os.path.exists(TARGET_FOLDER):
              # Sort files alphabetically
              for filename in sorted(os.listdir(TARGET_FOLDER)):
                  filepath = os.path.join(TARGET_FOLDER, filename)
                  if os.path.isfile(filepath):
                      with open(filepath, 'r', encoding='utf-8') as f:
                          # Read file and grab the first non-empty line
                          url = f.read().strip().split('\n')[0].strip()
                          if url.startswith('http'):
                              # Format as an entry: * Filename: [Link](URL)
                              links_list.append(f'* [{filename}]({url})')

          content_to_insert = '\n'.join(links_list)

          # Read current README
          with open('README.md', 'r', encoding='utf-8') as f:
              readme_text = f.read()

          # Replace text between these
          start_tag = '<!-- LINKS_START -->'
          end_tag = '<!-- LINKS_END -->'
          
          if start_tag in readme_text and end_tag in readme_text:
              before = readme_text.split(start_tag)[0]
              after = readme_text.split(end_tag)[1]
              new_readme = f'{before}{start_tag}\n{content_to_insert}\n{end_tag}{after}'
              
              with open('README.md', 'w', encoding='utf-8') as f:
                  f.write(new_readme)
          "

      - name: Commit and Push Changes
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git add README.md
          if ! git diff --staged --quiet; then
            git commit -m 'docs: automatically update links list in README'
            git push
          fi
